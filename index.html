<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="description"
    content="Modulare Vereinsplattform für Veranstaltungen, Einsätze, Eintragungen und Verwaltung."
  >

  <meta
    name="theme-color"
    content="#1f4b3f"
  >

  <title>Vereinsplattform</title>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var spaTarget = params.get('spa');

      if (spaTarget) {
        window.history.replaceState(null, '', spaTarget);
      }
    }());
  </script>

  <link
    rel="stylesheet"
    href="/vereinsverwaltung/assets/css/app.css?v=2.2.0"
  >
</head>

<body>
  <div
    id="app"
    class="app-shell"
  >
    <aside
      id="sidebar"
      class="sidebar"
      aria-label="Hauptnavigation"
    >
      <div class="brand">
        <div
          class="brand-mark"
          aria-hidden="true"
        >
          V
        </div>

        <div class="brand-copy">
          <strong id="tenantName">
            Vereinsplattform
          </strong>

          <span>
            Digitale Verwaltung
          </span>
        </div>
      </div>

      <nav class="navigation">
        <a
          href="#dashboard"
          data-route-link="dashboard"
        >
          <span
            class="nav-icon"
            aria-hidden="true"
          >
            ◫
          </span>

          <span>
            Dashboard
          </span>
        </a>

        <a
          href="#events"
          data-route-link="events"
        >
          <span
            class="nav-icon"
            aria-hidden="true"
          >
            ◷
          </span>

          <span>
            Einsätze
          </span>
        </a>

        <a
          href="#mine"
          data-route-link="mine"
        >
          <span
            class="nav-icon"
            aria-hidden="true"
          >
            ✓
          </span>

          <span>
            Meine Einsätze
          </span>
        </a>

        <a
          href="#points"
          data-route-link="points"
          data-points-only
          hidden
        >
          <span
            class="nav-icon"
            aria-hidden="true"
          >
            ◉
          </span>

          <span>
            Punkte
          </span>
        </a>

        <a
          href="#archive"
          data-route-link="archive"
        >
          <span
            class="nav-icon"
            aria-hidden="true"
          >
            ◰
          </span>

          <span>
            Archiv
          </span>
        </a>

        <div class="navigation-section">
          Verwaltung
        </div>

        <a
          href="#admin"
          data-route-link="admin"
        >
          <span
            class="nav-icon"
            aria-hidden="true"
          >
            ⚙
          </span>

          <span>
            Administration
          </span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div
          id="connectionStatus"
          class="connection-status"
          data-state="checking"
        >
          <span
            class="connection-dot"
            aria-hidden="true"
          ></span>

          <span>
            Verbindung wird geprüft
          </span>
        </div>
      </div>
    </aside>

    <div
      id="sidebarOverlay"
      class="sidebar-overlay"
      hidden
    ></div>

    <div class="main-shell">
      <header class="topbar">
        <button
          id="mobileMenuButton"
          class="mobile-menu"
          type="button"
          aria-label="Navigation öffnen"
          aria-expanded="false"
        >
          ☰
        </button>

        <div class="page-heading">
          <h1 id="pageTitle">
            Dashboard
          </h1>

          <p id="pageDescription">
            Alles Wichtige auf einen Blick
          </p>
        </div>

        <div class="topbar-actions">
          <span class="version-badge">
            Version 2.2
          </span>
        </div>
      </header>

      <main
        id="pageContent"
        class="page-content"
      >
        <section class="panel-card">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton"></div>
          <div class="skeleton skeleton-short"></div>
        </section>
      </main>
    </div>
  </div>

  <noscript>
    Diese Vereinsplattform benötigt JavaScript.
  </noscript>

  <script type="importmap">
    {
      "imports": {
        "/vereinsverwaltung/assets/js/admin.js": "/vereinsverwaltung/assets/js/admin.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/api.js": "/vereinsverwaltung/assets/js/api.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/app.js": "/vereinsverwaltung/assets/js/app.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/archive.js": "/vereinsverwaltung/assets/js/archive.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/auth.js": "/vereinsverwaltung/assets/js/auth.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/config.js": "/vereinsverwaltung/assets/js/config.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/events.js": "/vereinsverwaltung/assets/js/events.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/points.js": "/vereinsverwaltung/assets/js/points.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/router.js": "/vereinsverwaltung/assets/js/router.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/store.js": "/vereinsverwaltung/assets/js/store.js?v=2.2.0",
        "/vereinsverwaltung/assets/js/superadmin.js": "/vereinsverwaltung/assets/js/superadmin.js?v=2.2.0"
      }
    }
  </script>

  <script
    type="module"
    src="/vereinsverwaltung/assets/js/app.js?v=2.2.0"
  ></script>
</body>
</html>
